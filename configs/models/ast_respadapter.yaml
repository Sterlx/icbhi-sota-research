# ============================================================
# AST with Respiratory Adapter — Configuration
# Model: AST (Audio Spectrogram Transformer) + Cycle-Aware Adapter
# ============================================================

model:
  name: "AST-RespAdapter"
  backbone: "MIT/ast-finetuned-audioset-10-10-0.4593"
  backbone_type: "ast"
  pretrained: true
  freeze_backbone: false
  input_type: "mel"
  
  adapter:
    type: "respiratory_cycle"
    adapter_dim: 256
    num_cycles: 4
    dropout: 0.2
  
  classifier:
    hidden_dims: [768, 256, 128]
    dropout: 0.3
    num_classes: 4

data:
  data_dir: "./ICBHI_2017"
  sample_rate: 16000
  cycle_duration: 4.0
  num_workers: 4
  batch_size: 32

augmentation:
  use_specaugment: true
  time_mask_param: 20
  freq_mask_param: 12
  use_mixup: true
  mixup_alpha: 0.4

training:
  epochs: 100
  learning_rate: 0.0001
  weight_decay: 0.0001
  warmup_epochs: 5
  gradient_accumulation_steps: 1
  early_stopping_patience: 15
  seed: 42
