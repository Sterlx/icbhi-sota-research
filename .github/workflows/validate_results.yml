# ============================================================
# GitHub Actions: Results Validation
# Validates experiment results and updates SOTA tracker
# ============================================================

name: Validate Results & Update SOTA

on:
  push:
    paths:
      - 'experiments/*/metrics.json'
      - 'experiments/*/results.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pyyaml numpy scikit-learn
      
      - name: Validate results
        run: |
          python3 -c "
import json
import yaml
from pathlib import Path

# Find latest metrics
exp_dirs = sorted(Path('experiments').glob('exp_*'), reverse=True)
if not exp_dirs:
    print('No experiments found')
    exit(0)

latest = exp_dirs[0]
print(f'Validating: {latest.name}')

# Check metrics.json
metrics_file = latest / 'metrics.json'
if metrics_file.exists():
    with open(metrics_file) as f:
        metrics = json.load(f)
    
    score = metrics['metrics']['score']
    se = metrics['metrics']['sensitivity']
    sp = metrics['metrics']['specificity']
    
    print(f'  Score: {score}%')
    print(f'  Se: {se}% | Sp: {sp}%')
    
    # Validate score formula
    expected = (se + sp) / 2
    if abs(score - expected) > 0.1:
        print(f'  ⚠️  Score mismatch! Expected {expected:.2f}, got {score:.2f}')
        exit(1)
    else:
        print(f'  ✅ Score formula verified')
    
    # Check class balance
    if 'per_class' in metrics['metrics']:
        for cls_name, cls_metrics in metrics['metrics']['per_class'].items():
            cls_score = cls_metrics['score']
            cls_expected = (cls_metrics['sensitivity'] + cls_metrics['specificity']) / 2
            if abs(cls_score - cls_expected) > 0.1:
                print(f'  ⚠️  Per-class score mismatch for {cls_name}')
    
    print(f'  ✅ Validation passed!')
else:
    print(f'  ⚠️  No metrics.json found in {latest.name}')
"
      
      - name: Update SOTA leaderboard
        run: |
          python3 -c "
import json
from pathlib import Path
from datetime import datetime

# Collect all experiment results
all_results = []
for exp_dir in sorted(Path('experiments').glob('exp_*')):
    metrics_file = exp_dir / 'metrics.json'
    if metrics_file.exists():
        with open(metrics_file) as f:
            data = json.load(f)
        all_results.append({
            'exp_id': exp_dir.name,
            'score': data['metrics']['score'],
            'se': data['metrics']['sensitivity'],
            'sp': data['metrics']['specificity'],
        })

# Sort by score
all_results.sort(key=lambda x: x['score'], reverse=True)

# Update SOTA comparison file
with open('results/sota_comparison.md', 'w') as f:
    f.write('# ICBHI 2017 SOTA Comparison\n\n')
    f.write(f'*Last updated: {datetime.now().strftime(\"%Y-%m-%d %H:%M\")}*\n\n')
    f.write('## Official 60/40 Split — Per Respiratory Cycle\n\n')
    f.write('| Rank | Method | Se (%) | Sp (%) | Score (%) | Notes |\n')
    f.write('|------|--------|--------|--------|-----------|-------|\n')
    
    # Add known SOTA references
    known_sota = [
        ('RespCLIP (Chen 2024)', 61.10, 83.00, 72.05, 'Contrastive pretraining'),
        ('CLAP-MED (Zhang 2024)', 60.20, 82.50, 71.35, 'Medical CLAP'),
        ('LungNet (Nguyen 2024)', 58.90, 81.30, 70.10, 'Hybrid CNN-Transformer'),
        ('MS-SSL (Kim 2023)', 57.50, 80.10, 68.80, 'Multi-scale SSL'),
        ('AST Fine-tuned (2023)', 56.80, 79.20, 68.00, 'Audio Spectrogram Transformer'),
    ]
    
    for i, (name, se, sp, score, notes) in enumerate(known_sota, 1):
        f.write(f'| {i} | {name} | {se} | {sp} | {score} | {notes} |\n')
    
    # Add our results
    for i, r in enumerate(all_results[:5]):
        rank = len(known_sota) + i + 1
        f.write(f'| {rank} | **Ours** ({r[\"exp_id\"]}) | {r[\"se\"]} | {r[\"sp\"]} | {r[\"score\"]} | This work |\n')

print(f'SOTA table updated with {len(all_results)} experiments')
"
      
      - name: Commit SOTA update
        run: |
          git config user.name "ICBHI Research Bot"
          git config user.email "bot@icbhi-research.local"
          git add results/sota_comparison.md
          git diff --staged --quiet || git commit -m "[AUTO] Update SOTA comparison"
          git push origin main
